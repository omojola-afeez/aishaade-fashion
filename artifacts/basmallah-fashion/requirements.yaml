packages:
  "framer-motion": "For elegant page transitions and smooth UI animations matching the regal aesthetic"
  "react-hook-form": "For robust form state management in the admin dashboard"
  "@hookform/resolvers": "For zod schema validation with react-hook-form"
  "zod": "For form validation schemas"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For Tailwind class merging in utility functions"
  "date-fns": "For formatting dates in the admin dashboard"

images:
  - path: "artifacts/basmallah-fashion/public/images/hero-bg.png"
    description: "Elegant warm regal Islamic geometric pattern background with deep emerald green and soft warm gold accents, sophisticated, luxurious, high-end fashion"
    aspect_ratio: "16:9"
  - path: "artifacts/basmallah-fashion/public/images/category-men.png"
    description: "Luxurious men's African and Islamic fashion, Jalabia and caps on a mannequin, deep emerald background, studio lighting, highly detailed"
    aspect_ratio: "3:4"
  - path: "artifacts/basmallah-fashion/public/images/category-women.png"
    description: "Elegant women's Abaya on a mannequin, warm gold lighting, luxurious flowing fabric, regal setting, high fashion photography"
    aspect_ratio: "3:4"
  - path: "artifacts/basmallah-fashion/public/images/category-kids.png"
    description: "Kids Islamic clothing on mannequins, joyful but elegant presentation, warm cream and gold tones, studio lighting"
    aspect_ratio: "3:4"

notes:
  - Admin token is stored in localStorage as 'admin_token'
  - The API client hooks from @workspace/api-client-react are used directly, passing Authorization headers dynamically via the request option for admin routes
